storyId: "1.3"
storyTitle: "Ferramenta Postgres + Evolution API"
reviewDate: "2026-02-20"
reviewedBy: "Quinn (Test Architect)"
verdict: CONCERNS

issues:
  # CRITICAL
  - id: C1
    severity: critical
    category: code
    description: "lib/common.sh missing set -euo pipefail — errors in postgres functions silently swallowed"
    recommendation: "Note: lib files are sourced, not executed standalone. The calling scripts (02-postgres.sh, 03-evolution.sh) have set -euo pipefail. However, add defensive error handling in functions themselves."

  - id: C2
    severity: critical
    category: code
    description: "lib/env-detect.sh missing set -euo pipefail — same issue"
    recommendation: "Same as C1: sourced files inherit caller's set options. Add comment documenting this."

  - id: C3
    severity: critical
    category: security
    description: "~/postgres.yaml and ~/evolution.yaml contain credentials in plaintext without chmod 600"
    recommendation: "Add chmod 600 after generating YAML files in 02-postgres.sh and 03-evolution.sh"

  # HIGH
  - id: H1
    severity: high
    category: code
    description: "deployer.sh menu option [02] calls 03-evolution.sh directly — 02-postgres.sh unreachable as standalone"
    recommendation: "Add separate menu options or document that Postgres is only installed via Evolution cascata"

  - id: H4
    severity: high
    category: security
    description: "criar_banco_postgres_da_stack() has no input validation — SQL injection risk"
    recommendation: "Validate db_name against ^[a-z][a-z0-9_]*$ before using in SQL"

  - id: H5
    severity: high
    category: code
    description: "wait_stack_local() depends on jq without checking if installed"
    recommendation: "Add jq presence check or use docker compose ps --format table with grep"

  # MEDIUM
  - id: M2
    severity: medium
    category: code
    description: "verificar_container_postgres() grep matches partial names"
    recommendation: "Use anchored regex pattern"

  - id: M5
    severity: medium
    category: code
    description: "hint_dns called with hardcoded 'api.exemplo.com' before domain collection"
    recommendation: "Use generic message or move hint after input collection"

  - id: M6
    severity: medium
    category: code
    description: "redis:latest and evoapicloud/evolution-api:latest not pinned"
    recommendation: "Document tested versions, consider pinning"

qualityChecks:
  codeReview: CONCERNS  # 3 CRITICAL, 3 HIGH issues found
