# ============================================
# AIOSBot VPS Stack - Docker Compose
# ============================================
# Optional: Run AIOSBot in Docker instead of bare metal.
#
# Usage: docker-compose up -d

version: '3.8'

services:
  aiosbot:
    image: node:20-slim
    container_name: aiosbot-gateway
    restart: unless-stopped
    working_dir: /home/aiosbot
    user: "1000:1000"
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - aiosbot-data:/home/aiosbot/.aiosbot
      - workspace-data:/home/aiosbot/workspace
    environment:
      - NODE_ENV=production
      - HOME=/home/aiosbot
    env_file:
      - ../.env
    command: >
      sh -c "
        npm install -g @synkra/aiosbot@latest &&
        aiosbot gateway start
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Optional: Tailscale sidecar for VPN access
  tailscale:
    image: tailscale/tailscale:latest
    container_name: aiosbot-tailscale
    restart: unless-stopped
    hostname: ${GATEWAY_HOSTNAME:-aiosbot}
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTH_KEY:-}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    network_mode: host

volumes:
  aiosbot-data:
  workspace-data:
  tailscale-state:
